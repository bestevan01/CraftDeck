name: Release

# Builds the arm64 .deb on every version tag push, publishes it into a
# reprepro-managed apt repository, and deploys that repository (static
# Release/Packages/pool files) via GitHub's native Pages deployment (repo
# Settings -> Pages -> Source: GitHub Actions), which then serves it at the
# custom domain configured there. This is the whole reason
# `sudo apt install craftdeck` can work on a fresh Raspberry Pi OS install
# with no manual repo setup beyond adding this apt source once (see
# README/requirements.md packaging notes).
on:
  push:
    tags:
      - "v*"
    branches:
      - main
    # 문서 전용 변경(README/LICENSE 등)은 canary 빌드를 유발할 필요가
    # 없다 -- 코드가 하나도 안 바뀌었는데 버전 번호만 올라가는 걸 방지.
    paths-ignore:
      - "**.md"
      - "LICENSE"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Determine version's canary branch needs full tag/commit history
          # to find the last stable tag and count commits since it (a
          # shallow, depth-1 checkout can't do either) -- see that step.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Determine version
        id: version
        # Three channels (see packaging/apt-repo/conf/distributions'
        # Components and internal/update's Channel type):
        #   stable: tag "vX.Y.Z"            -> package version "X.Y.Z"
        #   beta:   tag "vX.Y.Z-beta.N"     -> package version "X.Y.Z~beta.N"
        #           (tilde, not hyphen -- verified via `dpkg --compare-versions`
        #           that a literal hyphen here sorts a beta *above* its final
        #           release instead of below it, which is backwards)
        #   canary: every push to main      -> "(last stable tag's version).canary-<Nth canary build since that tag>",
        #           e.g. last stable v0.1.0  -> "0.1.0.canary-1", then
        #           "0.1.0.canary-2", ... -- deterministic, no tag of its
        #           own needed. Verified via `dpkg --compare-versions` that
        #           this sorts as stable < canary-1 < canary-2 < ... < next
        #           stable (e.g. "0.1.0" < "0.1.0.canary-1" < "0.1.1").
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${GITHUB_REF_NAME#v}"
            case "$tag" in
              *-beta.*)
                version="${tag%-beta.*}~beta.${tag##*-beta.}"
                channel=beta
                ;;
              *)
                version="$tag"
                channel=stable
                ;;
            esac
          else
            last_stable=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | grep -v -- '-beta\.' | sort -V | tail -1)
            if [ -z "$last_stable" ]; then
              # No stable tag exists yet (first-ever release built from
              # main) -- count from the beginning of history instead of a
              # nonexistent tag ref.
              base="0.0.0"
              count=$(git rev-list --count HEAD)
            else
              base="${last_stable#v}"
              count=$(git rev-list --count "${last_stable}..HEAD")
            fi
            version="${base}.canary-${count}"
            channel=canary
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Cross-compile arm64 binary
        # -X bakes the tag version into internal/version.Version, which
        # handleCraftdeckVersion compares against the apt repo's Packages
        # index to tell the UI when an update is available -- without this
        # every build would report itself as "dev" and never match.
        run: |
          mkdir -p build
          GOOS=linux GOARCH=arm64 go build -buildvcs=false \
            -ldflags "-X craftdeck/internal/version.Version=${{ steps.version.outputs.version }}" \
            -o build/craftdeckd ./cmd/craftdeckd

      - name: Install nfpm and reprepro
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          sudo apt-get update && sudo apt-get install -y reprepro

      - name: Restore apt repository state
        # packaging/apt-repo's db/pool/dists aren't committed to git -- each
        # run's checkout starts from nothing but conf/. Before 3 channels
        # existed this didn't matter (every run reproduced the one and only
        # component from scratch and the Pages deploy fully replacing the
        # previous one was harmless), but now that stable/beta/canary are
        # separate components each carrying their own history, a run that
        # only publishes into e.g. "canary" must not silently wipe out
        # "main"/"beta"'s existing content when its deploy replaces the
        # whole site. Restoring the last run's state first makes each
        # `includedeb` genuinely incremental again.
        #
        # Uses a dedicated orphan branch (not actions/cache) because
        # actions/cache scopes caches by branch, and this repo's two
        # trigger types (a tag push and a main branch push) don't reliably
        # see each other's caches -- confirmed in practice: a cache saved
        # by a tag-triggered run was invisible to the very next
        # branch-triggered run's restore-keys fallback, silently wiping
        # main/beta again despite the cache steps reporting success. A git
        # branch has no such scoping.
        run: |
          rm -rf /tmp/apt-repo-state
          if git clone --quiet --depth 1 --branch apt-repo-state \
              "https://github.com/${{ github.repository }}.git" /tmp/apt-repo-state 2>/dev/null; then
            mkdir -p packaging/apt-repo
            cp -r /tmp/apt-repo-state/db packaging/apt-repo/ 2>/dev/null || true
            cp -r /tmp/apt-repo-state/pool packaging/apt-repo/ 2>/dev/null || true
            cp -r /tmp/apt-repo-state/dists packaging/apt-repo/ 2>/dev/null || true
            echo "restored previous apt repository state"
          else
            echo "no previous apt-repo-state branch yet -- starting fresh"
          fi

      - name: Fetch Adoptium's signing key
        # Not committed to the repo (.gitignore'd) since it's fetched fresh
        # from Adoptium here rather than trusted long-term from git history --
        # see packaging/nfpm.yaml's postinst comment for why it's bundled
        # into the .deb at all (FR-42c).
        run: |
          curl -fsSL https://packages.adoptium.net/artifactory/api/gpg/key/public \
            | gpg --dearmor -o packaging/adoptium.gpg

      - name: Import repo signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          {
            echo "allow-loopback-pinentry"
            echo "allow-preset-passphrase"
          } >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent

          # reprepro shells out to gpg non-interactively to sign the
          # Release file -- there's no prompt to type the passphrase into
          # in CI, so pre-load it into gpg-agent's cache via
          # gpg-preset-passphrase against the signing (primary) key's
          # keygrip, which is the first one gpg lists.
          KEYGRIP=$(gpg --list-secret-keys --with-keygrip --keyid-format=long | awk '/Keygrip/{print $3; exit}')
          PRESET_BIN=$(find /usr/lib* -name gpg-preset-passphrase 2>/dev/null | head -1)
          "$PRESET_BIN" --preset "$KEYGRIP" <<< "$GPG_PASSPHRASE"

      - name: Build .deb package
        working-directory: packaging
        env:
          ARCH: arm64
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          nfpm package --config nfpm.yaml --packager deb --target ../build/

      - name: Publish into the apt repository
        # Cumulative by design (see internal/update's Channel doc comment):
        # stable ships into every component so beta/canary subscribers
        # always have at least the latest stable available even during a
        # long gap between their own channel's builds; beta ships into
        # beta+canary; canary (built continuously off main) only into
        # canary. Same .deb file included into multiple components just
        # references the same pool blob by hash -- reprepro doesn't
        # duplicate storage for it.
        run: |
          case "${{ steps.version.outputs.channel }}" in
            stable) components="main beta canary" ;;
            beta) components="beta canary" ;;
            canary) components="canary" ;;
          esac
          for c in $components; do
            reprepro -b packaging/apt-repo -C "$c" includedeb trixie \
              "build/craftdeck_${{ steps.version.outputs.version }}_arm64.deb"
          done
          cp packaging/craftdeck-archive-keyring.gpg packaging/apt-repo/craftdeck-archive-keyring.gpg

      - name: Save apt repository state
        # Force-pushes a single squashed commit (not accumulated history)
        # to the apt-repo-state branch, since pool/ holds every .deb ever
        # published -- keeping full history here would make this branch
        # grow without bound across releases. This branch is pure current-
        # state storage, not a history anyone needs to read.
        run: |
          rm -rf /tmp/apt-repo-state-save
          mkdir -p /tmp/apt-repo-state-save
          cp -r packaging/apt-repo/db /tmp/apt-repo-state-save/ 2>/dev/null || true
          cp -r packaging/apt-repo/pool /tmp/apt-repo-state-save/ 2>/dev/null || true
          cp -r packaging/apt-repo/dists /tmp/apt-repo-state-save/ 2>/dev/null || true
          cd /tmp/apt-repo-state-save
          git init --quiet
          git checkout --quiet -b apt-repo-state
          git add -A
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit --quiet -m "apt repo state as of ${{ github.sha }}"
          git push --quiet --force \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            HEAD:apt-repo-state

      - name: Upload apt repo as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packaging/apt-repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
