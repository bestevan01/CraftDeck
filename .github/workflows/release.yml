name: Release

# Builds the arm64 .deb on every version tag push, publishes it into a
# reprepro-managed apt repository, and deploys that repository (static
# Release/Packages/pool files) via GitHub's native Pages deployment (repo
# Settings -> Pages -> Source: GitHub Actions), which then serves it at the
# custom domain configured there. This is the whole reason
# `sudo apt install craftdeck` can work on a fresh Raspberry Pi OS install
# with no manual repo setup beyond adding this apt source once (see
# README/requirements.md packaging notes).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cross-compile arm64 binary
        # -X bakes the tag version into internal/version.Version, which
        # handleCraftdeckVersion compares against the apt repo's Packages
        # index to tell the UI when an update is available -- without this
        # every build would report itself as "dev" and never match.
        run: |
          mkdir -p build
          GOOS=linux GOARCH=arm64 go build -buildvcs=false \
            -ldflags "-X craftdeck/internal/version.Version=${{ steps.version.outputs.version }}" \
            -o build/craftdeckd ./cmd/craftdeckd

      - name: Install nfpm and reprepro
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          sudo apt-get update && sudo apt-get install -y reprepro

      - name: Fetch Adoptium's signing key
        # Not committed to the repo (.gitignore'd) since it's fetched fresh
        # from Adoptium here rather than trusted long-term from git history --
        # see packaging/nfpm.yaml's postinst comment for why it's bundled
        # into the .deb at all (FR-42c).
        run: |
          curl -fsSL https://packages.adoptium.net/artifactory/api/gpg/key/public \
            | gpg --dearmor -o packaging/adoptium.gpg

      - name: Import repo signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          {
            echo "allow-loopback-pinentry"
            echo "allow-preset-passphrase"
          } >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent

          # reprepro shells out to gpg non-interactively to sign the
          # Release file -- there's no prompt to type the passphrase into
          # in CI, so pre-load it into gpg-agent's cache via
          # gpg-preset-passphrase against the signing (primary) key's
          # keygrip, which is the first one gpg lists.
          KEYGRIP=$(gpg --list-secret-keys --with-keygrip --keyid-format=long | awk '/Keygrip/{print $3; exit}')
          PRESET_BIN=$(find /usr/lib* -name gpg-preset-passphrase 2>/dev/null | head -1)
          "$PRESET_BIN" --preset "$KEYGRIP" <<< "$GPG_PASSPHRASE"

      - name: Build .deb package
        working-directory: packaging
        env:
          ARCH: arm64
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          nfpm package --config nfpm.yaml --packager deb --target ../build/

      - name: Publish into the apt repository
        run: |
          reprepro -b packaging/apt-repo includedeb trixie \
            "build/craftdeck_${{ steps.version.outputs.version }}_arm64.deb"
          cp packaging/craftdeck-archive-keyring.gpg packaging/apt-repo/craftdeck-archive-keyring.gpg

      - name: Upload apt repo as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packaging/apt-repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
