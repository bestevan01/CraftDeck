# FR-16: console log retention/rotation. journald has no per-unit retention
# knob -- only a global one -- so this caps total systemd-journal disk usage
# system-wide (not just the craftdeck-instance-<id> units whose journal is
# what the console/WebSocket streams -- see internal/api/handlers_console.go).
# Kept conservative for a Raspberry Pi that may be running off an SD card
# (requirements.md NFR-1/NFR-9).
[Journal]
SystemMaxUse=500M
MaxRetentionSec=30day
