name: craftdeck
arch: "${ARCH}" # set at build time: arm64 or armhf (see requirements.md NFR-2)
platform: linux
version: "${VERSION}"
maintainer: "CraftDeck maintainers"
description: >
  Web-managed Minecraft Java Edition server manager for Raspberry Pi.
homepage: https://github.com/example/craftdeck
license: MIT

depends:
  - ca-certificates
  # Debian's own repo only ships openjdk-17 (requirements.md FR-42a), so
  # these come from Adoptium instead -- registering that repo is install.sh's
  # job (it must run *before* this package's own apt transaction starts, not
  # postinst: postinst runs nested inside the outer `apt-get install`
  # invoking it, which already holds /var/lib/dpkg/lock-frontend, so a
  # second apt-get call from inside postinst deadlocks against it rather
  # than just failing-and-retrying. Declaring these as real Depends instead
  # lets apt resolve/install them as part of the same outer transaction,
  # with no nested apt-get involved at all.
  - temurin-8-jre
  - temurin-17-jre
  - temurin-21-jre
  - temurin-25-jre

contents:
  - src: ../build/craftdeckd
    dst: /usr/bin/craftdeckd
    file_info:
      mode: 0755
  - src: systemd/craftdeck.service
    dst: /lib/systemd/system/craftdeck.service
  - src: adoptium.gpg
    dst: /usr/share/keyrings/adoptium.gpg
    file_info:
      mode: 0644
  - src: systemd/journald-craftdeck.conf
    dst: /etc/systemd/journald.conf.d/craftdeck.conf
    file_info:
      mode: 0644
  - src: scripts/apt-hook
    dst: /usr/share/craftdeck/apt-hook
    file_info:
      mode: 0755
  - src: apt/99craftdeck
    dst: /etc/apt/apt.conf.d/99craftdeck
    file_info:
      mode: 0644

scripts:
  postinstall: scripts/postinst
  preremove: scripts/prerm
  postremove: scripts/postrm
